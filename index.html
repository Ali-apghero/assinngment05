<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Tailwind and diasyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- Styles  -->
    <link rel="stylesheet" href="./styles/style.css">

</head>
<body>

    <main>
    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-lg shadow-md w-full max-w-md text-center border border-gray-100">
            
            <div class="mb-6 flex justify-center">
                <img src="./assets/github-logo.png" alt="GitHub-Logo" class="w-20 h-20 rounded-full bg-gray-100 object-contain">
            </div>

            <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
            <p class="text-sm text-gray-500 mt-1 mb-8">Sign in to manage your issues</p>

            <form id="login-form" class="text-left">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <span class="text-xs text-indigo-600 mt-1 block">Default: admin</span>
                </div>

                <div class="mb-6 text-left">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <span class="text-xs text-indigo-600 mt-1 block">Default: admin123</span>
                </div>

                <button type="submit" id="login-btn"
                        class="w-full bg-[#4a00ff] hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors duration-300">
                    Sign In
                </button>
            </form>

            <div class="relative my-8 border-b border-gray-200">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-xs text-gray-400 font-medium">OR</span>
            </div>

            <div class="bg-gray-50 p-6 rounded-lg border border-gray-100">
                <p class="text-xs text-gray-400 mb-3">Demo Credentials:</p>
                <p class="text-sm text-gray-700"><strong>Username:</strong> admin</p>
                <p class="text-sm text-gray-700 mt-1"><strong>Password:</strong> admin123</p>
            </div>
            
        </div>
    </div>
</main>

<script src="index.js"></script>
        
</body>
</html>
