<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectonour | GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { 
            font-family: 'Geist', sans-serif; 
            scroll-behavior: smooth;
        }
        /* Custom scrollbar for better UX */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #4a00ff; border-radius: 10px; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-900">

    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-white z-[100] transition-opacity duration-500">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-xs font-bold text-indigo-600 animate-pulse uppercase tracking-widest">Loading Vectonour</p>
        </div>
    </div>

    <div class="min-h-screen pb-20">
        <header class="glass-header border-b border-gray-100 px-6 py-4 flex items-center justify-between sticky top-0 z-10 flex-wrap gap-4 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="hover:rotate-12 transition-transform duration-300">
                    <img class="h-[45px] w-[45px] md:h-[55px] md:w-[55px] rounded-xl object-cover shadow-md" src="./assets/github-logo.png" alt="logo">
                </div>
                <div>
                    <h1 class="text-base md:text-xl font-black text-slate-800 tracking-tight">GitHub Issues Tracker</h1>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase">Dev Dashboard</p>
                </div>
            </div>

            <div class="flex items-center gap-4 w-full md:w-auto justify-between">
                <div class="relative flex-grow md:flex-grow-0 group">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" id="search-input" placeholder="Search issues..." 
                        class="w-full md:w-72 bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 focus:bg-white transition-all shadow-inner">
                </div>
                <button id="add-issue-btn" class="bg-[#4a00ff] hover:bg-indigo-700 active:scale-95 text-white px-5 py-2 rounded-xl font-bold text-sm transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-8">
                <div class="p-5 md:p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center shadow-inner">
                            <img src="./assets/Aperture.png" class="w-8 h-8 opacity-80" alt="logo">
                        </div>
                        <div>
                            <h2 id="issue-count" class="font-black text-slate-800 text-2xl tracking-tight">0 Issues</h2>
                            <p class="text-xs text-slate-400 font-semibold uppercase tracking-widest flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                Live Project Management
                            </p>
                        </div>
                    </div>

                    <div id="filter-container" class="bg-slate-100 p-1.5 rounded-2xl border border-slate-200 inline-flex shadow-inner">
                        <button class="filter-btn bg-[#4a00ff] text-white px-6 py-2 rounded-xl text-xs font-bold shadow-md transition-all">All</button>
                        <button class="filter-btn text-slate-500 px-6 py-2 hover:text-indigo-600 rounded-xl text-xs font-bold transition-all">Open</button>
                        <button class="filter-btn text-slate-500 px-6 py-2 hover:text-indigo-600 rounded-xl text-xs font-bold transition-all">Closed</button>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 min-h-[300px] transition-all duration-500">
                </div>
        </main>
    </div>

    <div id="issue-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300 px-4">
        <div class="bg-white rounded-[2rem] p-8 md:p-10 max-w-lg w-full shadow-2xl transform scale-95 transition-all duration-300 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-10 -mt-10 w-32 h-32 bg-indigo-50 rounded-full blur-3xl opacity-50"></div>
            
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modal-title" class="text-2xl font-black text-slate-800 leading-tight">Issue Title</h2>
                    <button id="close-modal-top" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-800 transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <div class="flex items-center gap-3 mb-8">
                    <span id="modal-status-badge" class="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-lg font-black uppercase tracking-widest shadow-sm">Open</span>
                    <span id="modal-meta" class="text-[11px] text-slate-400 font-bold uppercase tracking-tight tracking-wider">Opened by User • Date</span>
                </div>

                <div class="mb-10">
                    <p class="text-[11px] font-black text-slate-300 uppercase mb-3">Description</p>
                    <p id="modal-description" class="text-[15px] text-slate-600 leading-relaxed bg-slate-50 p-5 rounded-2xl border border-slate-100 italic">Description details go here...</p>
                </div>
                
                <div class="bg-slate-900 rounded-[1.5rem] p-5 flex justify-between items-center mb-8 shadow-xl">
                    <div class="flex items-center gap-4">
                        <div id="modal-avatar" class="w-10 h-10 rounded-xl overflow-hidden ring-2 ring-indigo-500/20">
                            <img src="" class="w-full h-full object-cover" alt="U">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">Assignee</span>
                            <p id="modal-user-name" class="text-sm font-bold text-white">User Name</p>
                        </div>
                    </div>
                    <div id="modal-priority-dot" class="flex flex-col items-end">
                        <span class="text-[9px] text-slate-500 font-bold uppercase mb-1">Priority</span>
                        <div class="flex items-center gap-2">
                            <span id="modal-priority-text" class="text-xs font-black uppercase text-rose-500">High</span>
                            <span class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.5)]"></span>
                        </div>
                    </div>
                </div>

                <button id="close-modal-btn" class="w-full bg-[#4a00ff] hover:bg-indigo-700 active:scale-[0.98] text-white py-4 rounded-2xl font-black text-sm transition-all shadow-xl shadow-indigo-100 uppercase tracking-widest">
                    Done Reading
                </button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
