<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-[#F8F9FB]">

    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-white z-[100] transition-opacity duration-500">
    <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>

    <div class="min-h-screen pb-20">
        <header class="bg-white border-b border-gray-100 px-6 py-3 flex items-center justify-between sticky top-0 z-10 flex-wrap gap-4">
            <div class="flex items-center gap-3">
                <img class="h-[40px] w-[40px] md:h-[60px] md:w-[60px] rounded-full object-cover" src="./assets/github-logo.png" alt="logo">
                <h1 class="text-base md:text-lg font-bold text-gray-800">GitHub Issues Tracker</h1>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto justify-between">
                <div class="relative flex-grow md:flex-grow-0">
                    <input type="text" id="search-input" placeholder="Search issues..." 
                        class="w-full md:w-64 bg-gray-50 border border-gray-200 rounded-lg px-4 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:bg-white transition-all">
                </div>
                <button id="add-issue-btn" class="bg-[#4a00ff] hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg font-bold text-sm transition-colors shadow-sm">
                    + New Issue
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="flex flex-col gap-6 mb-8">
                <div class="bg-white p-4 md:p-6 rounded-t-2xl border border-gray-100 border-b-0 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                    <div id="filter-container" class="bg-gray-50 p-1 rounded-xl border border-gray-100 inline-flex shadow-sm">
                        <button class="filter-btn bg-[#4a00ff] text-white px-4 md:px-6 py-1.5 rounded-lg text-sm font-bold">All</button>
                        <button class="filter-btn text-gray-400 px-4 md:px-6 py-1.5 hover:bg-white rounded-lg text-sm font-semibold">Open</button>
                        <button class="filter-btn text-gray-400 px-4 md:px-6 py-1.5 hover:bg-white rounded-lg text-sm font-semibold">Closed</button>
                    </div>
                </div>

                <div class="bg-white p-6 border border-gray-100 border-b-0 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center overflow-hidden">
                            <img src="./assets/Aperture.png" class="w-full h-full object-cover" alt="logo">
                        </div>
                        <div>
                            <h2 id="issue-count" class="font-bold text-gray-800 text-base">0 Issues</h2>
                            <p class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Track and manage your project issues</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-4 md:p-6 bg-white border border-gray-100 rounded-b-2xl shadow-sm min-h-[200px]">
            </div>
        </main>
    </div>

    <div id="issue-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300 px-4">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-lg w-full shadow-2xl transform scale-95 transition-all duration-300">
            <div class="flex justify-between items-start mb-2">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800">Issue Title</h2>
                <button id="close-modal-top" class="text-gray-400 hover:text-gray-800"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="flex items-center gap-3 mb-6">
                <span id="modal-status-badge" class="bg-emerald-500 text-white text-[10px] px-2.5 py-1 rounded-full font-bold uppercase">Open</span>
                <span id="modal-meta" class="text-[11px] text-gray-400">Opened by User • Date</span>
            </div>

            <p id="modal-description" class="text-sm text-gray-600 leading-relaxed mb-8 border-l-4 border-gray-100 pl-4">Description...</p>
            
            <div class="bg-gray-50 rounded-xl p-4 flex justify-between items-center mb-8 border border-gray-100">
                <div class="flex items-center gap-3">
                    <div id="modal-avatar" class="w-8 h-8 rounded-full overflow-hidden border border-indigo-100">
                        <img src="" class="w-full h-full object-cover" alt="U">
                    </div>
                    <p id="modal-user-name" class="text-xs font-bold text-gray-700">User Name</p>
                </div>
                <div id="modal-priority-dot" class="flex items-center gap-1.5">
                    <span id="modal-priority-text" class="text-[10px] font-bold uppercase text-red-500">High</span>
                    <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                </div>
            </div>

            <button id="close-modal-btn" class="w-full bg-[#4a00ff] hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100">
                Close Details
            </button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
